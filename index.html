<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽鬼牌：極限生存戰</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="status-bar">
        <div class="hp-box">
            玩家生命: <span id="player-hp">❤️❤️</span>
        </div>
        
        <button class="game-btn" onclick="initGame()">重新開始遊戲</button>
        
        <div class="hp-box">
            電腦生命: <span id="cpu-hp">❤️❤️</span>
        </div>
    </div>

    <div id="game-container">
        
        <div class="section">
            <h3>電腦的手牌 (<span id="cpu-count">0</span>)</h3>
            <div id="cpu-cards" class="card-area">
                </div>
        </div>

        <div id="discard-pile-container">
            <div id="discard-pile" class="card back">
                </div>
            <div id="msg-board">載入中...</div>
        </div>

        <div class="section" id="player-section">
            <h3>你的手牌 (<span id="player-count">0</span>)</h3>
            
            <div id="player-cards-wrapper">
                <div id="player-cards" class="card-area">
                    </div>
                
                <button id="discard-btn" class="game-btn" onclick="playerDiscardAll()">
                    打出全部對子
                </button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
