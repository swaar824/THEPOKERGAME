<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽鬼牌小遊戲</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-board">
        <button id="restart-btn" class="ui-btn" onclick="initGame()"></button>

        <div id="cpu-hp" class="hp-display"></div>

        <div id="cpu-hand-area" class="hand-container"></div>

        <div id="discard-pile" class="card"></div>

        <button id="discard-btn" class="ui-btn" onclick="playerDiscardAll()"></button>

        <div id="player-hand-area" class="hand-container"></div>

        <div id="player-hp" class="hp-display"></div>

        <div id="coin-overlay" class="hidden">
            <div id="coin">
                <div class="side heads"></div> <div class="side tails"></div> </div>
            <div id="coin-result-text"></div>
        </div>
        
        <div id="msg-board"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
